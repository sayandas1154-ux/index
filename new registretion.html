<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>
<body>
    <div style="background-image:url('https://images.freeimages.com/images/large-previews/cd0/vintage-textured-background-0410-5699369.jpg?fmt=webp&w=500.jpg');
    background-size:cover;
    background-position:center">
    <h1><mark>Registration Form For Students</mark></h1>
    <s>All students are applicaple for this form</s>
    <br>
    <del>We have total 60 students to apply</del>
    <table border="5">
        <tr>
            <th colspan="2">Name</th>
            <th rowspan="2">Roll</th>
            <th>Grade</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Amit Haldar</td>
            <td>001</td>
            <td>A+</td>
            <td>23</td>
        </tr>
        <tr>
            <td>Sayantanashis Haldar</td>
            <td>002</td>
            <td>O</td>
            <td>21</td>
        </tr>
        <tr>
            <td>Rahul Mondal</td>
            <td>003</td>
            <td>A</td>
            <td>23</td>
        </tr>
        <tr>
            <td>Rana Das</td>
            <td>004</td>
            <td>A+</td>
            <td>22</td>
        </tr>
        <tr>
            <td>Suman Sarkar</td>
            <td>005</td>
            <td>A</td>
            <td>21</td>
        </tr>
         <tr>
            <td>Sayan Das</td>
            <td>006</td>
            <td>A+</td>
            <td>20</td>
        </tr>
    </table>
    <br>
    <hr>
    <img src="https://cdn.vectorstock.com/i/500p/20/85/open-book-with-blank-pages-vector-57522085.jpg" width=400 alt="Book">
    <br>
    <br>
    <label for="Name">Name of the student: <input type="text"></label>
    <br>
    <br>
    <label for="Age">Age of the student: <input type="number" max="26" min="6"></label>
    <br>
    <br>
    <label for="Birth-day">
        Date of Birth:
        <input type="Date" name="DOB" min="2000" max="2020" >
    </label>
    <br>
    <br>
    <label for="Marital Status">
        Marital Status of the student:
        Married: <input type="radio" name="Marital status" value="Married">&ensp;&ensp;

        Unmarried: <input type="radio" name="Marital status" value="unmarried">
    </label>
    <br>
    <br>
    <label for="Gender">
        Gender of the student:
        Male: <input type="radio" name="Gender" value="Male">&ensp;&ensp;

        Female: <input type="radio" name="Gender" value="Female">
    </label>
    <br>
    <br>
    <label for="Email">
        Email of the student: <input type="email">
    </label>
    <br><br>
    <label for="Password">
        Enter Password: <input type="password">
    </label>
    <br><br>
    <br><br>
    <label for="Skilllevel">
        Skill Level: <input type="range" name="volume">
    </label>
    <br><br>
    <label for="OK">
       Are you agree with these informations: <input type="button" value="OK" name="OK">
    </label>
    <hr>
    <label for="Skill">
        Skill of the student:
        CSS <input type="checkbox" name="Skill" value="CSS">&ensp;&ensp;

        JS <input type="checkbox" name="Skill" value="JS">&ensp;&ensp;

        HTML <input type="checkbox" name="Skill" value="HTML">&ensp;&ensp;

        JAVA <input type="checkbox" name="Skill" value="JAVA">&ensp;&ensp;

        PYTHON <input type="checkbox" name="Skill" value="PYTHON">&ensp;&ensp;

        C++ <input type="checkbox" name="Skill" value="C++">&ensp;&ensp;

        C <input type="checkbox" name="Skill" value="C">&ensp;&ensp;

    </label>
    <br>
    <br>
    <label for="City">
        City of the student:
        <select name="City" id="">
            <option value="Dehli">Dehli</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Chennai">Chennai</option>
            <option value="Bengaluru">Bengaluru</option>
            <option value="Pune">Pune</option>
            <option value="Madras">Madras</option>
        </select>
    </label>
    <br>
    <br>
    <label for="Favourite Company">
        Student's Favourite Company:
        <select name="Company" id="">
            <option value="">TCS</option>
            <option value="">Wipro</option>
            <option value="">Infosys</option>
            <option value="">Cogzinant</option>
            <option value="">Amazon</option>
            <option value="">Flipkart</option>
            <option value="">None</option>
        </select>
    </label>
    <br>
    <br>
    <hr>
    <label for="">
    <input type="submit" name="Submit">
    <input type="reset" name="Reset">
    <br><br>
    <a href="https://code.visualstudio.com//">Download VS Code</a>
    <br><br>
    <a href="/hallow world.html">Goto Myregistration</a>
    </label>
</div>
</body>
</html>
